    <script>
        // 1. Disable Right Click (Context Menu)
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 2. Disable Keyboard Shortcuts commonly used for DevTools
        document.onkeydown = function(e) {
            // F12
            if (e.keyCode === 123) {
                return false;
            }
            // Ctrl+Shift+I (Windows) or Cmd+Option+I (Mac)
            if (e.ctrlKey && e.shiftKey && e.keyCode === 'I'.charCodeAt(0)) {
                return false;
            }
            // Ctrl+Shift+J (Windows) or Cmd+Option+J (Mac)
            if (e.ctrlKey && e.shiftKey && e.keyCode === 'J'.charCodeAt(0)) {
                return false;
            }
            // Ctrl+U (View Source)
            if (e.ctrlKey && e.keyCode === 'U'.charCodeAt(0)) {
                return false;
            }
            // Ctrl+S (Save Page)
            if (e.ctrlKey && e.keyCode === 'S'.charCodeAt(0)) {
                return false;
            }
        };

        // 3. Disable Dragging of elements (prevents dragging images/text to desktop)
        document.ondragstart = function() { return false; };
    </script>
