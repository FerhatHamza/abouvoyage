<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abou Voyage - Profil Numérique</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS Anti-Selection: Prevents users from highlighting text/images */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            overflow-x: hidden;
        }
        
        /* Hide scrollbar for a cleaner mobile app look */
        ::-webkit-scrollbar {
            display: none;
        }

        /* Flight Animations */
        @keyframes fly-primary {
            0% { transform: translate(-20vw, 20vh) rotate(-15deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translate(120vw, -20vh) rotate(-15deg) scale(1.2); opacity: 0; }
        }
        
        @keyframes fly-secondary {
            0% { transform: translate(-20vw, 60vh) rotate(-10deg) scale(0.5); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translate(120vw, 10vh) rotate(-10deg) scale(0.7); opacity: 0; }
        }

        @keyframes float-clouds {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .plane-1 {
            position: fixed;
            color: rgba(255, 255, 255, 0.5);
            font-size: 6rem;
            animation: fly-primary 18s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        .plane-2 {
            position: fixed;
            color: rgba(255, 255, 255, 0.3);
            font-size: 4rem;
            animation: fly-secondary 25s linear infinite;
            animation-delay: 8s;
            z-index: 0;
            pointer-events: none;
        }

        /* Dynamic Sky Background */
        .sky-bg {
            background: linear-gradient(-45deg, #0ea5e9, #2563eb, #38bdf8, #1e40af);
            background-size: 400% 400%;
            animation: float-clouds 15s ease infinite;
        }
    </style>
</head>
<body class="sky-bg min-h-screen flex items-center justify-center p-4 antialiased text-gray-800 relative">

    <!-- Background Flight Effects -->
    <i class="fa-solid fa-plane plane-1"></i>
    <i class="fa-solid fa-plane plane-2"></i>

    <!-- Main Card Container -->
    <div class="bg-white/90 backdrop-blur-xl w-full max-w-sm sm:max-w-md rounded-[2rem] shadow-2xl overflow-hidden border border-white/40 relative z-10 my-8">

        <!-- Top Spacing for Logo -->
        <div class="h-20 bg-gradient-to-b from-blue-100/50 to-transparent relative">
             <!-- Logo Image -->
             <div class="absolute -bottom-8 left-1/2 transform -translate-x-1/2">
                <img src="image.png" alt="Abou Voyage Logo" class="w-28 h-28 rounded-full border-4 border-white shadow-lg object-contain bg-white">
             </div>
        </div>

        <!-- Content Area -->
        <div class="pt-12 pb-6 px-6 text-center">
            <h1 class="text-2xl font-black text-blue-900 tracking-tight mb-1">Abou Voyage</h1>
            <p class="text-xs text-blue-500 font-bold tracking-widest uppercase mb-6"><i class="fa-solid fa-earth-americas mr-1"></i>Expérience Incroyable</p>

            <!-- Action Links -->
            <div class="space-y-3">

                <!-- WhatsApp -->
                <a href="https://wa.me/213770962698" target="_blank" rel="noopener noreferrer" class="flex items-center p-4 bg-white hover:bg-green-50 active:bg-green-100 rounded-2xl transition-all duration-300 shadow-sm border border-gray-100 group">
                    <div class="w-10 h-10 flex items-center justify-center bg-green-500 text-white rounded-full group-hover:scale-110 transition-transform shadow-md">
                        <i class="fa-brands fa-whatsapp text-xl"></i>
                    </div>
                    <div class="ml-4 text-left">
                        <p class="text-xs text-gray-500 font-medium">WhatsApp</p>
                        <p class="text-sm font-bold text-gray-800">0770 96 26 98</p>
                    </div>
                </a>

                <!-- Instagram -->
                <a href="https://www.instagram.com/abouvoyage" target="_blank" rel="noopener noreferrer" class="flex items-center p-4 bg-white hover:bg-pink-50 active:bg-pink-100 rounded-2xl transition-all duration-300 shadow-sm border border-gray-100 group">
                    <div class="w-10 h-10 flex items-center justify-center bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-500 text-white rounded-full group-hover:scale-110 transition-transform shadow-md">
                        <i class="fa-brands fa-instagram text-xl"></i>
                    </div>
                    <div class="ml-4 text-left">
                        <p class="text-xs text-gray-500 font-medium">Instagram</p>
                        <p class="text-sm font-bold text-gray-800">@abouvoyage</p>
                    </div>
                </a>

                <!-- Facebook -->
                <a href="https://www.facebook.com/medit972" target="_blank" rel="noopener noreferrer" class="flex items-center p-4 bg-white hover:bg-blue-50 active:bg-blue-100 rounded-2xl transition-all duration-300 shadow-sm border border-gray-100 group">
                    <div class="w-10 h-10 flex items-center justify-center bg-blue-600 text-white rounded-full group-hover:scale-110 transition-transform shadow-md">
                        <i class="fa-brands fa-facebook-f text-xl"></i>
                    </div>
                    <div class="ml-4 text-left">
                        <p class="text-xs text-gray-500 font-medium">Facebook</p>
                        <p class="text-sm font-bold text-gray-800">Abou Voyage</p>
                    </div>
                </a>

                <!-- Email -->
                <a href="mailto:abouvoyageservice@gmail.com" class="flex items-center p-4 bg-white hover:bg-red-50 active:bg-red-100 rounded-2xl transition-all duration-300 shadow-sm border border-gray-100 group">
                    <div class="w-10 h-10 flex items-center justify-center bg-red-500 text-white rounded-full group-hover:scale-110 transition-transform shadow-md">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div class="ml-4 text-left overflow-hidden">
                        <p class="text-xs text-gray-500 font-medium">Email</p>
                        <p class="text-sm font-bold text-gray-800 truncate">abouvoyageservice@gmail.com</p>
                    </div>
                </a>
            </div>
        </div>

        <!-- Integrated Google Map -->
        <div class="w-full bg-gray-200 border-t border-gray-200">
            <div class="p-3 bg-white flex items-center justify-center text-sm font-bold text-gray-700">
                <i class="fa-solid fa-location-dot text-red-500 mr-2"></i> Draria, Algeria
            </div>
            <!-- Embedded Map using standard search query -->
            <iframe 
                src="https://maps.google.com/maps?q=Draria,%20Algeria&t=&z=14&ie=UTF8&iwloc=&output=embed" 
                width="100%" 
                height="220" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade"
                class="w-full object-cover">
            </iframe>
        </div>
    </div>

    <!-- JavaScript Anti-Scraping / Anti-Inspect Deterrents -->
    <script>
        // 1. Disable Right Click (Context Menu)
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 2. Disable Keyboard Shortcuts commonly used for DevTools
        document.onkeydown = function(e) {
            // F12
            if (e.keyCode === 123) {
                return false;
            }
            // Ctrl+Shift+I (Windows) or Cmd+Option+I (Mac)
            if (e.ctrlKey && e.shiftKey && e.keyCode === 'I'.charCodeAt(0)) {
                return false;
            }
            // Ctrl+Shift+J (Windows) or Cmd+Option+J (Mac)
            if (e.ctrlKey && e.shiftKey && e.keyCode === 'J'.charCodeAt(0)) {
                return false;
            }
            // Ctrl+U (View Source)
            if (e.ctrlKey && e.keyCode === 'U'.charCodeAt(0)) {
                return false;
            }
            // Ctrl+S (Save Page)
            if (e.ctrlKey && e.keyCode === 'S'.charCodeAt(0)) {
                return false;
            }
        };

        // 3. Disable Dragging of elements
        document.ondragstart = function() { return false; };
    </script>
</body>
</html>
